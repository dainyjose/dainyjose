name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download GitHub stats SVG safely
        run: |
          echo "⬇️ Fetching stats..."

          curl -L -H "User-Agent: github-actions" \
          "https://github-readme-stats.vercel.app/api?username=dainyjose&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=true" \
          -o temp.svg

          echo "🔍 Validating SVG..."

          # Check if valid SVG content exists
          if grep -q "<svg" temp.svg; then
            mv temp.svg github-stats.svg
            echo "✅ Valid SVG updated"
          else
            echo "❌ Invalid SVG (API error / rate limit / downtime)"
            echo "⚠️ Keeping previous file (if exists)"
            rm -f temp.svg
            exit 0
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add github-stats.svg

          git diff --staged --quiet || git commit -m "Update GitHub stats"

          git push
